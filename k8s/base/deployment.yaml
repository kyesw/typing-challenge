apiVersion: apps/v1
kind: Deployment
metadata:
  name: typing-game-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: typing-game-backend
  template:
    metadata:
      labels:
        app: typing-game-backend
    spec:
      containers:
        - name: typing-game-backend
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/typing-game-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: typing-game-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
