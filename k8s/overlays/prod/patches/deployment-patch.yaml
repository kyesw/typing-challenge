apiVersion: apps/v1
kind: Deployment
metadata:
  name: typing-game-backend
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: typing-game-backend
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
