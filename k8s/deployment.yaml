apiVersion: apps/v1
kind: Deployment
metadata:
  name: typing-game-backend
  labels:
    app: typing-game-backend
  namespace: typing-game
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: typing-game-backend
  template:
    metadata:
      labels:
        app: typing-game-backend
    spec:
      containers:
        - name: typing-game-backend
          image: typing-game-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TYPING_GAME_ENVIRONMENT
              value: "production"
            - name: TYPING_GAME_SESSION_TTL_SECONDS
              value: "1800"
            - name: TYPING_GAME_MAX_GAME_DURATION_SECONDS
              value: "120"
            - name: TYPING_GAME_PROMPT_SELECTION_POLICY
              value: "random"
            - name: TYPING_GAME_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: typing-game-secrets
                  key: database-url
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: typing-game-backend
  labels:
    app: typing-game-backend
  namespace: typing-game
spec:
  selector:
    app: typing-game-backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  type: ClusterIP
