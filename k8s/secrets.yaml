apiVersion: v1
kind: Secret
metadata:
  name: typing-game-secrets
  namespace: typing-game
  labels:
    app: typing-game-backend
type: Opaque
stringData:
  # Replace with your actual RDS PostgreSQL connection string
  # Format: postgresql://username:password@rds-endpoint:5432/database_name
  database-url: "postgresql://typing_game_user:CHANGE_ME@your-rds-endpoint.region.rds.amazonaws.com:5432/typing_game"
